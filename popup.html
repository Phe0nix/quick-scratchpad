<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Scratchpad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup-body compact-body">
    <main class="app-shell compact-shell">
      <header class="toolbar">
        <div>
          <h1>Quick Scratchpad</h1>
          <p class="subtitle">Instant notes. Auto-saved locally.</p>
        </div>
        <div class="toolbar-actions">
          <button id="themeBtn" class="pill-btn toolbar-pill theme-pill" title="Toggle theme" aria-label="Toggle theme">☾ <span>Theme</span></button>
          <button id="expandBtn" class="pill-btn toolbar-pill" title="Open full view" aria-label="Open full view">↗ <span>Expand</span></button>
        </div>
      </header>

      <div class="action-row">
        <button id="copyBtn" class="pill-btn">📋 <span>Copy</span></button>
        <button id="exportBtn" class="pill-btn">⬇ <span>Export</span></button>
        <button id="clearBtn" class="pill-btn subtle-btn">✕ <span>Clear</span></button>
      </div>

      <section class="editor-shell">
        <div id="editor" class="editor" contenteditable="true" role="textbox" aria-multiline="true" aria-label="Scratchpad editor" data-placeholder="Start typing your note..."></div>
        <div id="emptyHint" class="empty-hint" aria-live="polite">
          <strong>Quick start</strong>
          <span>Ctrl/Cmd + Shift + Y → open</span>
          <span>Ctrl/Cmd + S → save</span>
          <span>Ctrl/Cmd + Shift + C → copy</span>
        </div>
      </section>

      <div id="formatToolbar" class="format-toolbar" role="toolbar" aria-label="Text formatting toolbar">
        <button class="format-btn" data-command="bold" title="Bold" aria-label="Bold">B</button>
        <button class="format-btn" data-command="italic" title="Italic" aria-label="Italic">I</button>
        <button class="format-btn" data-command="underline" title="Underline" aria-label="Underline">U</button>
        <button class="format-btn" data-command="strikeThrough" title="Strikethrough" aria-label="Strikethrough">S</button>
        <button class="format-btn" data-command="createLink" title="Add link" aria-label="Add link">🔗</button>
        <button class="format-btn" data-command="removeFormatAll" title="Remove formatting" aria-label="Remove formatting">⊘</button>
      </div>

      <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

      <footer class="statusbar">
        <div class="stats">
          <span id="wordCount">0 words</span>
          <span aria-hidden="true">•</span>
          <span id="charCount">0 chars</span>
        </div>
        <div id="saveStatus" class="save-status">Ready</div>
      </footer>
    </main>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
